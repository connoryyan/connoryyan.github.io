<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>A Basic Calculator</h1>

        <p>
            Enter Your First Number:
            <input id="num1" type="number">
        </p>

        <p>
            Enter Your Second Number:
            <input id="num2" type="number">
        </p>

        <center>Choose a basic arithmetic operation from the following option below:</center>
        <br>

        <div class="btn-group">
            <button id="add-btn">Add</button>
            <button id="subtract-btn">Subtract</button>
            <button id="multiply-btn">Multiply</button>
            <button id="divide-btn">Divide</button>
        </div>

        <br>

        <div class="result-box">
            Here is the result:&nbsp;
            <span id="result">0</span>
        </div>
    </div>

    <script src="script.js"></script>
 
</body>
</html>
